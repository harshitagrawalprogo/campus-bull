services:
  - type: web
    name: campus-bull-api
    runtime: node
    buildCommand: npm install && npx prisma generate
    startCommand: node server/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NODE_TLS_REJECT_UNAUTHORIZED
        value: "0"

